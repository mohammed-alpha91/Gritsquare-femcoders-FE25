    <main>
        <h1>Let's spread positivity!</h1>
        <button id="openCard" class="left-btn">Press here</button>

        <div id="card" class="hidden">
        <form id="msgForm">
            <h2>Put a smile on someone´s face!</h2>
            <p>Message:</p>
            <input type="text" id="messageInput" maxlength="120" placeholder="Write something positive..." required>
            <button type="submit">Send</button>
        </form>
            <div id="gifSearchSection">
                <input type="text" id="gifSearchInput" placeholder="Search for GIFs (e.g., cat, dog, happy)...">
                <button id="searchGifBtn">Search GIFs</button>
                <div id="gifResults"></div>
                <div id="selectedGifPreview"></div>
            </div>
        </div>

    <section id="messages-display"></section>

    <section id="messages"></section>
    </main>
